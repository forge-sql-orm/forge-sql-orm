version: 2
updates:
  # ==========================================
  # ROOT & CLI
  # ==========================================
  - package-ecosystem: "npm"
    directory: "/" 
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      all-deps-root:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/forge-sql-orm-cli"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      all-deps-cli:
        patterns:
          - "*"

